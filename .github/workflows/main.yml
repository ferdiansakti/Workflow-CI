name: MLflow CI + Docker

on:
  push:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      # ======================
      # CHECKOUT
      # ======================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ======================
      # SETUP PYTHON
      # ======================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ======================
      # INSTALL DEPENDENCIES
      # ======================
      - name: Install dependencies
        run: |
          pip install mlflow pandas scikit-learn

      # ======================
      # RUN ML PROJECT
      # ======================
      - name: Run MLflow Project
        run: mlflow run MLProject --env-manager=local

      # ======================
      # SAVE ARTIFACT
      # ======================
      - name: Upload MLruns
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns

      # ======================
      # LOGIN DOCKER
      # ======================
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ======================
      # BUILD DOCKER (FIXED)
      # ======================
      - name: Build Docker Image
        run: |
          docker build -t loan-model ./MLProject

      # ======================
      # PUSH DOCKER
      # ======================
      - name: Push Docker Image
        run: |
          docker tag loan-model ${{ secrets.DOCKER_USERNAME }}/loan-model:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/loan-model:latest
